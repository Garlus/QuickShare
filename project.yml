name: QuickShare
options:
  bundleIdPrefix: com.quickshare
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  QuickShare:
    type: application
    platform: macOS
    sources:
      - path: macOS/QuickShareApp
      - path: macOS/Sources/QuickShareBridge
      - path: macOS/Bridge/quickshare.h
        buildPhase: headers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quickshare.app
        INFOPLIST_FILE: macOS/QuickShareApp/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/macOS/Bridge/quickshare.h
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/macOS/Bridge"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/macOS/Bridge"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lquickshare_core"
          - "-Wl,-deployment_target_mismatches,suppress"
          - "-framework"
          - "CoreBluetooth"
          - "-framework"
          - "Security"
          - "-framework"
          - "SystemConfiguration"
          - "-framework"
          - "IOKit"
    dependencies:
      - target: ShareExtension
    preBuildScripts:
      - name: "Build Rust Core"
        script: |
          # Build Rust core manually via terminal:
          #   bash macOS/build.sh
          echo "Rust core: use 'bash macOS/build.sh' to rebuild"

  ShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - macOS/ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quickshare.app.share-extension
        INFOPLIST_FILE: macOS/ShareExtension/ShareExtension-Info.plist
        CODE_SIGN_STYLE: Automatic
